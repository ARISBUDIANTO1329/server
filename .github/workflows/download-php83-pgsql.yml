name: Download php8.3-pgsql deb

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-22.04

    steps:
      - name: Add Ondrej PHP PPA
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common ca-certificates lsb-release
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update

      - name: Audit PHP package availability
        run: |
          echo "=== sources ==="
          grep -R "ondrej\|launchpad\|php" /etc/apt/sources.list /etc/apt/sources.list.d || true
          echo "=== apt-cache policy php8.3 ==="
          apt-cache policy php8.3 || true
          echo "=== apt-cache policy php8.3-pgsql ==="
          apt-cache policy php8.3-pgsql || true
          echo "=== apt-cache search php8.3 pgsql ==="
          apt-cache search php8.3 | grep -i "pgsql\|postgres" || true
          echo "=== apt-cache search pgsql ==="
          apt-cache search pgsql | grep -i "php" || true

      - name: Download candidate package
        run: |
          mkdir -p debs
          cd debs
          apt-get download php8.3-pgsql
          ls -lah

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: php8.3-pgsql-deb
          path: debs/*.deb
